<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تطبيق أذكار - إشعارات النظام</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --green: #10b981;
      --red: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: var(--card);
      border-radius: 24px;
      padding: 30px 25px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 20px;
      color: var(--primary);
      font-weight: 700;
    }
    .dhikr {
      font-size: 1.5rem;
      margin: 25px 0 30px;
      line-height: 1.6;
      min-height: 85px;
      font-weight: 500;
    }
    .counter-box {
      width: 190px;
      height: 190px;
      margin: 0 auto 25px;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.2rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 15px 35px rgba(99,102,241,0.5);
      user-select: none;
    }
    .counter-box:active {
      transform: scale(0.88);
      box-shadow: 0 8px 20px rgba(99,102,241,0.4);
    }
    .target {
      margin: 15px 0 25px;
      font-size: 1.15rem;
    }
    .target input {
      width: 100px;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid #475569;
      background: #334155;
      color: white;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      padding: 14px 26px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      min-width: 140px;
    }
    .reset { background: var(--red); color: white; }
    .notify { background: #8b5cf6; color: white; }
    .vibrate { background: var(--green); color: white; }
    button:hover { transform: translateY(-3px); opacity: 0.95; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(16,185,129,0.97);
      color: white;
      padding: 16px 32px;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      bottom: 50px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>تطبيق الأذكار</h1>
  <div class="dhikr" id="dhikrText">سبحان الله</div>
  <div class="counter-box" id="counter">0</div>
  <div class="target">
    الهدف: <input type="number" id="target" value="33" min="1">
  </div>
  <div class="controls">
    <button class="reset" id="reset">إعادة تعيين</button>
    <button class="notify" id="enableNotify">تفعيل إشعارات النظام</button>
  </div>
  <button class="vibrate" id="vibrateToggle" style="margin-top:15px;">اهتزاز عند الانتهاء: ❌</button>
</div>
<div class="toast" id="toast">مبروك! وصلت للهدف 🎉</div>
<script>
  // =============== المتغيرات ===============
  const counterEl     = document.getElementById('counter');
  const dhikrText     = document.getElementById('dhikrText');
  const targetInput   = document.getElementById('target');
  const resetBtn      = document.getElementById('reset');
  const notifyBtn     = document.getElementById('enableNotify');
  const vibrateBtn    = document.getElementById('vibrateToggle');
  const toast         = document.getElementById('toast');
  let count           = 0;
  let target          = 33;
  let notificationsEnabled = false;
  let shouldVibrate   = false;
  // =============== حفظ وتحميل (مع fallback لو كان sandbox) ===============
  function loadData() {
    try {
      const saved = localStorage.getItem('azkarData');
      if (saved) {
        const data = JSON.parse(saved);
        count  = data.count  || 0;
        target = data.target || 33;
      }
    } catch (e) {
      // لو في sandbox أو file://
      console.log('localStorage محظور - سيتم استخدام الذاكرة فقط');
    }
    targetInput.value = target;
    updateCounter();
  }
  function saveData() {
    try {
      localStorage.setItem('azkarData', JSON.stringify({ count, target }));
    } catch (e) {}
  }
  // =============== تحديث العداد ===============
  function updateCounter() {
    counterEl.textContent = count;
    if (count >= target && target > 0) {
      showToast();
      if (notificationsEnabled) showSystemNotification();
      if (shouldVibrate && navigator.vibrate) navigator.vibrate([120, 60, 120]);
      // count = 0;   // أزل التعليق إذا أردت إعادة الصفر تلقائياً
    }
  }
  function showToast() {
    toast.textContent = `أحسنت! أكملت ${target} ${dhikrText.textContent} 🎉`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }
  // =============== إشعار النظام الحقيقي (في مركز الإشعارات) ===============
  function showSystemNotification() {
    if (Notification.permission === 'granted') {
      new Notification('تطبيق الأذكار', {
        body: `لقد أكملت ${target} ${dhikrText.textContent} ✨`,
        icon: 'https://img.icons8.com/fluency/96/muslim.png',
        badge: 'https://img.icons8.com/fluency/96/muslim.png',
        tag: 'azkar-complete',
        requireInteraction: false
      });
    }
  }
  // =============== تفعيل الإشعارات ===============
  notifyBtn.addEventListener('click', async () => {
    if (!('Notification' in window)) {
      alert('متصفحك لا يدعم الإشعارات');
      return;
    }
    let permission = Notification.permission;
    if (permission === 'default') {
      permission = await Notification.requestPermission();
    }
    if (permission === 'granted') {
      notificationsEnabled = true;
      notifyBtn.textContent = '✅ إشعارات النظام مفعلة';
      notifyBtn.disabled = true;
    } else {
      alert('تم رفض الإذن. يمكنك تفعيله من إعدادات المتصفح.');
    }
  });
  // =============== النقر على العداد ===============
  counterEl.addEventListener('click', () => {
    count++;
    updateCounter();
    saveData();
  });
  // =============== الأزرار الأخرى ===============
  resetBtn.addEventListener('click', () => {
    count = 0;
    updateCounter();
    saveData();
  });
  targetInput.addEventListener('change', () => {
    target = parseInt(targetInput.value) || 33;
    if (target < 1) target = 1;
    targetInput.value = target;
    updateCounter();
    saveData();
  });
  vibrateBtn.addEventListener('click', () => {
    shouldVibrate = !shouldVibrate;
    vibrateBtn.textContent = `اهتزاز عند الانتهاء: ${shouldVibrate ? '✅' : '❌'}`;
  });
  // =============== بدء التطبيق ===============
  loadData();
  // نصيحة للمستخدم
  console.log('%c✅ التطبيق جاهز! اضغط على "تفعيل إشعارات النظام" ليظهر الإشعار في مركز الإشعارات', 'color:#6366f1;font-size:14px');
</script>
</body>
</html>
